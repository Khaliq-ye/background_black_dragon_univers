function buildPath(shape) {
  const p = new Path2D();
  const o = shape.outline;
  p.moveTo(o[0][0], o[0][1]);
  for (let i = 1; i < o.length; i++) p.lineTo(o[i][0], o[i][1]);
  p.closePath();
  for (const h of shape.holes) {
    p.moveTo(h[0][0], h[0][1]);
    for (let i = 1; i < h.length; i++) p.lineTo(h[i][0], h[i][1]);
    p.closePath();
  }
  return p;
}
function buildOutlineOnlyPath(shape) {
  const p = new Path2D();
  const o = shape.outline;
  p.moveTo(o[0][0], o[0][1]);
  for (let i = 1; i < o.length; i++) p.lineTo(o[i][0], o[i][1]);
  p.closePath();
  return p;
}
function buildHolesOnlyPath(shape) {
  const p = new Path2D();
  for (const h of shape.holes) {
    p.moveTo(h[0][0], h[0][1]);
    for (let i = 1; i < h.length; i++) p.lineTo(h[i][0], h[i][1]);
    p.closePath();
  }
  return p;
}

const FOOT_JOIN_X = 0.001;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const START_TIME = Date.now();
const INTRO_MS = 2600;
function introAlpha() {
  return Math.min(1, (Date.now() - START_TIME) / INTRO_MS);
}

function softGlow(x, y, radius, alpha) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, `rgba(255,255,255,${alpha})`);
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

const SPACE_TYPES = ['star', 'star', 'star', 'galaxy', 'blackhole', 'planet', 'comet', 'nebula'];
const spaceObjects = [];
let lastSpawn = 0;
const SPAWN_INTERVAL = 480;
const MAX_OBJECTS = 28;

function randRange(a, b) { return a + Math.random() * (b - a); }

function spawnSpaceObject() {
  if (spaceObjects.length >= MAX_OBJECTS) return;
  const type = SPACE_TYPES[Math.floor(Math.random() * SPACE_TYPES.length)];
  const margin = 60;
  spaceObjects.push({
    type,
    x: randRange(margin, W - margin),
    y: randRange(margin, H - margin),
    r: type === 'nebula' ? randRange(40, 80)
      : type === 'galaxy' ? randRange(22, 40)
      : type === 'blackhole' ? randRange(18, 30)
      : type === 'planet' ? randRange(10, 22)
      : type === 'comet' ? randRange(4, 7)
      : randRange(1.5, 4), // star
    hue: Math.floor(randRange(0, 360)),
    rot: randRange(0, Math.PI * 2),
    spin: randRange(-0.01, 0.01),
    born: Date.now(),
    fadeInMs: 700,
    state: 'alive',
    suckStart: 0,
    suckFromX: 0,
    suckFromY: 0,
    twinklePhase: randRange(0, Math.PI * 2),
    vx: type === 'comet' ? randRange(-0.4, 0.4) : 0,
    vy: type === 'comet' ? randRange(-0.4, 0.4) : 0
  });
}

function popSpaceObject(obj) {
  if (obj.state !== 'alive') return;
  obj.state = 'sucking';
  obj.suckStart = Date.now();
  obj.suckFromX = obj.x;
  obj.suckFromY = obj.y;
}

function drawSpaceObject(obj, alpha, scale) {
  ctx.save();
  ctx.translate(obj.x, obj.y);
  ctx.rotate(obj.rot);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;

  if (obj.type === 'star') {
    const twinkle = 0.55 + 0.45 * Math.sin(Date.now() / 400 + obj.twinklePhase);
    ctx.globalAlpha = alpha * twinkle;
    // glow lembut di sekitar bintang
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.r * 4);
    glow.addColorStop(0, 'rgba(255,255,255,0.5)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, obj.r * 4, 0, Math.PI * 2); ctx.fill();

    const spike = obj.r * 3.4;
    const waist = obj.r * 0.45;
    ctx.beginPath();
    ctx.moveTo(0, -spike);
    ctx.quadraticCurveTo(waist, -waist, spike, 0);
    ctx.quadraticCurveTo(waist, waist, 0, spike);
    ctx.quadraticCurveTo(-waist, waist, -spike, 0);
    ctx.quadraticCurveTo(-waist, -waist, 0, -spike);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, obj.r * 0.55, 0, Math.PI * 2);
    ctx.fill();

  } else if (obj.type === 'galaxy') {

    const bulge = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.r * 0.3);
    bulge.addColorStop(0, 'rgba(255,255,255,0.9)');
    bulge.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.save();
    ctx.scale(1, 0.55);
    ctx.fillStyle = bulge;
    ctx.beginPath(); ctx.arc(0, 0, obj.r * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    for (let arm = 0; arm < 3; arm++) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = obj.r * 0.035;
      ctx.beginPath();
      for (let i = 0; i <= 28; i++) {
        const t = i / 28;
        const ang = t * Math.PI * 2.4 + arm * (Math.PI * 2 / 3);
        const rad = t * obj.r;
        const px = Math.cos(ang) * rad;
        const py = Math.sin(ang) * rad * 0.42;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      for (let i = 5; i <= 26; i += 5) {
        const t = i / 28;
        const ang = t * Math.PI * 2.4 + arm * (Math.PI * 2 / 3);
        const rad = t * obj.r;
        const px = Math.cos(ang) * rad, py = Math.sin(ang) * rad * 0.42;
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath(); ctx.arc(px, py, obj.r * 0.018, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = obj.r * 0.02;
    ctx.beginPath();
    ctx.ellipse(0, 0, obj.r, obj.r * 0.42, 0, 0, Math.PI * 2);
    ctx.stroke();

  } else if (obj.type === 'blackhole') {
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = obj.r * 0.13;
    ctx.beginPath();
    ctx.ellipse(0, 0, obj.r * 1.85, obj.r * 0.62, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = obj.r * 0.07;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.ellipse(0, 0, obj.r * 1.4, obj.r * 0.46, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = obj.r * 0.035;
    ctx.beginPath();
    ctx.ellipse(0, 0, obj.r * 1.08, obj.r * 1.08, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(0, 0, obj.r, 0, Math.PI * 2);
    ctx.fill();

  } else if (obj.type === 'planet') {
    ctx.fillStyle = 'rgba(235,235,235,0.92)';
    ctx.beginPath();
    ctx.arc(0, 0, obj.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = obj.r * 0.06;
    ctx.stroke();

    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, obj.r, 0, Math.PI * 2); ctx.clip();
    const bands = 3 + (obj.hue % 3);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth = obj.r * 0.05;
    for (let b = 1; b < bands; b++) {
      const by = -obj.r + (obj.r * 2) * b / bands;
      ctx.beginPath();
      ctx.moveTo(-obj.r, by);
      ctx.lineTo(obj.r, by);
      ctx.stroke();
    }
    ctx.restore();

    if (obj.hue % 2 === 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = obj.r * 0.08;
      ctx.beginPath();
      ctx.ellipse(0, 0, obj.r * 1.7, obj.r * 0.35, 0.4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = obj.r * 0.13;
      ctx.beginPath();
      ctx.ellipse(0, 0, obj.r * 1.45, obj.r * 0.28, 0.4, 0, Math.PI * 2);
      ctx.stroke();
    }

  } else if (obj.type === 'comet') {
    ctx.rotate(-obj.rot + Math.atan2(obj.vy, obj.vx));
    const dustGrad = ctx.createLinearGradient(-obj.r * 11, 0, 0, 0);
    dustGrad.addColorStop(0, 'rgba(255,255,255,0)');
    dustGrad.addColorStop(1, 'rgba(255,255,255,0.8)');
    ctx.strokeStyle = dustGrad;
    ctx.lineWidth = obj.r * 0.6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-obj.r * 11, obj.r * 0.6);
    ctx.quadraticCurveTo(-obj.r * 4, obj.r * 0.22, 0, 0);
    ctx.stroke();
    const thinGrad = ctx.createLinearGradient(-obj.r * 8.5, 0, 0, 0);
    thinGrad.addColorStop(0, 'rgba(255,255,255,0)');
    thinGrad.addColorStop(1, 'rgba(255,255,255,0.55)');
    ctx.strokeStyle = thinGrad;
    ctx.lineWidth = obj.r * 0.22;
    ctx.beginPath();
    ctx.moveTo(-obj.r * 8.5, -obj.r * 0.35);
    ctx.quadraticCurveTo(-obj.r * 3, -obj.r * 0.12, 0, 0);
    ctx.stroke();
    const coma = ctx.createRadialGradient(0, 0, 0, 0, 0, obj.r * 2.2);
    coma.addColorStop(0, 'rgba(255,255,255,0.85)');
    coma.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = coma;
    ctx.beginPath(); ctx.arc(0, 0, obj.r * 2.2, 0, Math.PI * 2); ctx.fill();
    const nucleusPts = [
      [0.85, 0], [0.5, 0.65], [-0.15, 0.8], [-0.75, 0.35],
      [-0.7, -0.4], [-0.1, -0.85], [0.55, -0.55]
    ];
    ctx.beginPath();
    nucleusPts.forEach(([nx, ny], i) => {
      const px = nx * obj.r * 0.75, py = ny * obj.r * 0.75;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();

  } else if (obj.type === 'nebula') {
    const puffs = [
      [0, 0, 1], [-0.45, -0.2, 0.65], [0.4, 0.25, 0.7],
      [0.1, -0.4, 0.55], [-0.3, 0.4, 0.5], [0.5, -0.15, 0.45]
    ];
    for (const [px, py, pr] of puffs) {
      const cx = px * obj.r, cy = py * obj.r, cr = pr * obj.r * 0.7;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cr);
      grad.addColorStop(0, 'rgba(255,255,255,0.13)');
      grad.addColorStop(0.6, 'rgba(255,255,255,0.06)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    }
    for (let i = 0; i < 4; i++) {
      const ang = (i / 4) * Math.PI * 2 + obj.hue;
      const rad = obj.r * (0.2 + 0.5 * ((i * 37) % 5) / 5);
      const px = Math.cos(ang) * rad, py = Math.sin(ang) * rad * 0.7;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(px, py, obj.r * 0.015, 0, Math.PI * 2); ctx.fill();
    }
  }

  ctx.restore();
}

function updateAndDrawSpaceObjects() {
  const now = Date.now();
  if (now - lastSpawn > SPAWN_INTERVAL) {
    lastSpawn = now;
    spawnSpaceObject();
  }

  for (let idx = spaceObjects.length - 1; idx >= 0; idx--) {
    const obj = spaceObjects[idx];

    if (obj.type === 'comet') { obj.x += obj.vx; obj.y += obj.vy; }
    obj.rot += obj.spin;

    let alpha = Math.min(1, (now - obj.born) / obj.fadeInMs);
    let scale = 1;
    if (obj.state === 'sucking') {
      const SUCK_MS = 260;
      const t = Math.min(1, (now - obj.suckStart) / SUCK_MS);
      if (t >= 1) { spaceObjects.splice(idx, 1); continue; }
      const te = t * t;
      const head = points[0];
      obj.x = obj.suckFromX + (head.x - obj.suckFromX) * te;
      obj.y = obj.suckFromY + (head.y - obj.suckFromY) * te;
      scale = Math.max(0.001, 1 - te);
      alpha = 1 - te * 0.5;
    }

    softGlow(obj.x, obj.y, Math.max(16, obj.r * 3), 0.13 * alpha);
    drawSpaceObject(obj, alpha, scale);

    if (obj.state === 'alive') {
      const head = points[0];
      const dx = head.x - obj.x, dy = head.y - obj.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const headRadius = SEG_LEN * 5.5 * 0.32;
      if (dist < headRadius + obj.r) popSpaceObject(obj);
    }
  }
}

const mouse = { x: W / 2, y: H / 2 };
let hasMoved = false;
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; hasMoved = true; });
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (t) { mouse.x = t.clientX; mouse.y = t.clientY; hasMoved = true; }
}, { passive: true });

const NUM_POINTS = 50;
const SEG_LEN = 18;
const points = [];
for (let i = 0; i < NUM_POINTS; i++) points.push({ x: W / 2, y: H / 2 });

let revealedCount = 0;
const REVEAL_SPEED = 0.22;
const REVEAL_MOVE_THRESHOLD = 0.05;

function updateChain() {
  const head = points[0];
  const prevHeadX = head.x, prevHeadY = head.y;
  const ease = hasMoved ? 0.08 : 0.02;
  head.x += (mouse.x - head.x) * ease;
  head.y += (mouse.y - head.y) * ease;

  const headMoved = Math.hypot(head.x - prevHeadX, head.y - prevHeadY) > REVEAL_MOVE_THRESHOLD;
  if (headMoved && revealedCount < NUM_POINTS - 1) {
    revealedCount += REVEAL_SPEED;
  }

  for (let i = 1; i < NUM_POINTS; i++) {
    const p = points[i], prev = points[i - 1];
    const dx = prev.x - p.x, dy = prev.y - p.y;
    const ang = Math.atan2(dy, dx);
    p.x = prev.x - Math.cos(ang) * SEG_LEN;
    p.y = prev.y - Math.sin(ang) * SEG_LEN;
  }
}

function tailDirAt(i) {
  if (i < NUM_POINTS - 1) {
    const a = points[i], b = points[i + 1];
    return Math.atan2(b.y - a.y, b.x - a.x);
  } else {
    const a = points[i - 1], b = points[i];
    return Math.atan2(b.y - a.y, b.x - a.x);
  }
}

function rotateToward(ctx, tx, ty) {
  const ang = Math.atan2(ty, tx) - Math.PI / 2;
  ctx.rotate(ang);
}

function taper(i) {
  const t = i / (NUM_POINTS - 1);
  const neck = 1.05;
  const grow = 1 / (1 + Math.exp(-(t - 0.18) * 12));
  const base = 1.25 * Math.pow(Math.max(0, 1 - t), 1.9) + 0.05;
  return Math.max(0.05, neck + (base - neck) * grow);
}

function drawVertebra(i) {
  const p = points[i];
  const dir = tailDirAt(i);
  const tx = Math.cos(dir), ty = Math.sin(dir);
  const sizeY = SEG_LEN * 2.765;
  const sizeX = sizeY * SHAPES.body.aspect * taper(i);

  ctx.save();
  ctx.translate(p.x, p.y);
  rotateToward(ctx, tx, ty);
  ctx.scale(sizeX, sizeY);
  const g = ctx.createLinearGradient(-0.5, 0, 0.5, 0);
  g.addColorStop(0, 'rgba(0,0,0,0.28)');
  g.addColorStop(0.5, 'rgba(0,0,0,1)');
  g.addColorStop(1, 'rgba(0,0,0,0.28)');
  ctx.fillStyle = g;
  ctx.fill(BODY_PATH);
  ctx.restore();

  ctx.save();
  ctx.translate(p.x, p.y);
  rotateToward(ctx, tx, ty);
  ctx.scale(sizeX, sizeY);
  ctx.lineWidth = 0.008;
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.stroke(BODY_PATH);
  ctx.restore();
}

function drawWingAt(originIndex, sizeFactor, flapSpeed, flapAmount) {
  const p = points[originIndex];
  const dir = tailDirAt(originIndex);
  const flap = Math.sin(Date.now() / flapSpeed) * flapAmount;
  const tx = Math.cos(dir), ty = Math.sin(dir);

  const size = SEG_LEN * sizeFactor * (1 + flap * 0.25);

  ctx.save();
  ctx.translate(p.x, p.y);
  rotateToward(ctx, tx, ty);
  ctx.rotate(flap);
  ctx.translate(0, -size * 0.5);
  ctx.scale(size * SHAPES.wing.aspect, size);
  const g = ctx.createRadialGradient(0, -0.15, 0, 0, -0.15, 0.62);
  g.addColorStop(0, 'rgba(0,0,0,1)');
  g.addColorStop(0.45, 'rgba(0,0,0,0.75)');
  g.addColorStop(1, 'rgba(0,0,0,0.08)');
  ctx.fillStyle = g;
  ctx.fill(WING_PATH);
  ctx.restore();
}

function drawWings() {
  if (revealedCount >= 13) drawWingAt(13, 15, 900, 0.10);
  if (revealedCount >= 23) drawWingAt(23, 8, 1000, 0.10);
}

function drawLimbAt(originIndex, sizeFactor, type) {
  const p = points[originIndex];
  const dir = tailDirAt(originIndex);
  const tx = Math.cos(dir), ty = Math.sin(dir);
  const size = SEG_LEN * sizeFactor;

  const shape = type === 'hand' ? SHAPES.hand : SHAPES.foot;
  const outlinePath = type === 'hand' ? HAND_OUTLINE_PATH : FOOT_OUTLINE_PATH;
  const holesPath = type === 'hand' ? HAND_HOLES_PATH : FOOT_HOLES_PATH;
  const joinX = type === 'hand' ? HAND_JOIN_X : FOOT_JOIN_X;
  const joinY = type === 'hand' ? HAND_JOIN_Y : FOOT_JOIN_Y;

  ctx.save();
  ctx.translate(p.x, p.y);
  rotateToward(ctx, tx, ty);

  ctx.translate(-joinX * size * shape.aspect, -joinY * size);
  ctx.scale(size * shape.aspect, size);

  const gradCX = 0;
  const gradCY = type === 'hand' ? 0 : -0.42;
  const g = ctx.createRadialGradient(gradCX, gradCY, 0, gradCX, gradCY, 0.7);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(0.25, 'rgba(0,0,0,0.1)');
  g.addColorStop(0.45, 'rgba(0,0,0,0.6)');
  g.addColorStop(1, 'rgba(0,0,0,1)');
  ctx.fillStyle = g;
  ctx.fill(outlinePath);
  ctx.fillStyle = '#ffffff';
  ctx.fill(holesPath);
  ctx.restore();
}

function drawLimbs() {
  if (revealedCount >= 12) drawLimbAt(12, 5, 'hand');
  if (revealedCount >= 22) drawLimbAt(22, 5, 'foot');
}

function drawHead() {
  const p = points[0];
  const dir = tailDirAt(0);
  const tx = Math.cos(dir), ty = Math.sin(dir);
  const size = SEG_LEN * 5.5;

  ctx.save();
  ctx.translate(p.x, p.y);
  rotateToward(ctx, tx, ty);
  ctx.scale(size * SHAPES.head.aspect, size);
  ctx.fillStyle = '#000000';
  ctx.fill(HEAD_OUTLINE_PATH);
  ctx.fillStyle = '#ffffff';
  ctx.fill(HEAD_HOLES_PATH);
  ctx.restore();
}

let backgroundCliffs = null;
function midpointRidge(width, baseY, amplitude, roughness, iterations) {
  let points = [
    { x: 0, y: baseY + (Math.random() * 2 - 1) * amplitude * 0.4 },
    { x: width, y: baseY + (Math.random() * 2 - 1) * amplitude * 0.4 }
  ];
  let disp = amplitude;
  for (let it = 0; it < iterations; it++) {
    const next = [];
    for (let i = 0; i < points.length - 1; i++) {
      const a = points[i], b = points[i + 1];
      next.push(a);
      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2 + (Math.random() * 2 - 1) * disp;
      next.push({ x: midX, y: midY });
    }
    next.push(points[points.length - 1]);
    points = next;
    disp *= roughness;
  }
  return points;
}

function initBackgroundCliffs() {
  const baseY = H * 0.6;
  const layers = [
    { points: midpointRidge(W, baseY - H * 0.08, H * 0.13, 0.58, 7), alpha: 0.045 },
    { points: midpointRidge(W, baseY,            H * 0.16, 0.6,  7), alpha: 0.08 },
    { points: midpointRidge(W, baseY + H * 0.09, H * 0.19, 0.62, 7), alpha: 0.14 }
  ];
  backgroundCliffs = { layers };
}

function drawBackgroundCliffs() {
  if (!backgroundCliffs) initBackgroundCliffs();
  for (const layer of backgroundCliffs.layers) {
    ctx.beginPath();
    ctx.moveTo(layer.points[0].x, layer.points[0].y);
    for (let i = 1; i < layer.points.length; i++) ctx.lineTo(layer.points[i].x, layer.points[i].y);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = `rgba(255,255,255,${layer.alpha})`;
    ctx.fill();
  }
}

function drawBackground() {
  // gelap gulita ala luar angkasa
  const g = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.75);
  g.addColorStop(0, '#111111');
  g.addColorStop(0.6, '#050505');
  g.addColorStop(1, '#000000');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  drawBackgroundCliffs();
}

function loop() {
  drawBackground();
  updateChain();

  const introA = introAlpha();

  updateAndDrawSpaceObjects();

  ctx.save();
  ctx.globalAlpha = introA;

  drawLimbs();

  for (let i = NUM_POINTS - 1; i >= 1; i--) {
    if (i <= revealedCount) drawVertebra(i);
  }
  drawWings();
  drawHead();

  ctx.restore();

  requestAnimationFrame(loop);
}
loop();
</script>
